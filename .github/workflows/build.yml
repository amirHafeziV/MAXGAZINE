name: Build site

# Compiles content/ -> static HTML. Runs:
#  - whenever content changes (panel commits articles/ads)
#  - hourly, so scheduled articles go live when their publishAt time passes
#  - on manual/panel dispatch ("Deploy site" button in MasterWriter)
on:
  push:
    branches: [main]
    paths:
      - "content/**"
      - "assets/uploads/**"
      - "build/**"
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: agents
        run: npm install

      - name: Build static site
        working-directory: agents
        env:
          SITE_ORIGIN: ${{ vars.SITE_ORIGIN }}
        run: npm run build

      - name: Commit & push
        run: |
          git config user.name "maxgazine-build"
          git config user.email "build@maxgazine.com"
          git add en/ fa/ ar/ tr/ sitemap.xml
          if git diff --staged --quiet; then
            echo "Nothing new to publish."
          else
            git commit -m "build: publish $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase origin main
            git push
          fi
