name: Deploy panel

# Deploys the MasterWriter panel (admin/) to the authorspanel subdomain on
# cPanel via FTPS. The panel is a separate PHP app from the static site, so it
# has its own deploy. Runs when admin/** changes, or on manual dispatch.
#
# Requires the same FTP secrets as the site deploy:
#   secrets.FTP_HOST / FTP_USERNAME / FTP_PASSWORD
#   vars.DEPLOY_ENABLED   == 'true'   (gate; same one the site deploy uses)
#   vars.PANEL_REMOTE_DIR (optional, defaults to 'authorspanel/')
#
# The on-host config.php (GitHub token) and data/ (SQLite user DB) are never
# tracked in the repo and are excluded below, so this never overwrites them.
on:
  push:
    branches: [main]
    paths:
      - "admin/**"
  workflow_dispatch:

concurrency:
  group: deploy-panel
  cancel-in-progress: false

jobs:
  deploy-panel:
    if: vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy admin/ to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./admin/
          server-dir: ${{ vars.PANEL_REMOTE_DIR || 'authorspanel/' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
            config.php
            data/**
            README.md
